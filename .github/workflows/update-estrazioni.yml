name: Aggiorna estrazioni Lotto (dati.gov.it)

on:
  schedule:
    - cron: "35 20 * * 2,4,6"
  workflow_dispatch:

jobs:
  update-estrazioni:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scarica dataset ufficiale Lotto
        run: |
          curl -sS "https://www.dati.gov.it/api/3/action/package_show?id=lotto" -o dataset.json

      - name: Estrai URL ultimo file
        run: |
          python3 << 'EOF'
          import json, re, urllib.request

          data = json.load(open("dataset.json"))
          resources = data["result"]["resources"]

          # Trova il file più recente in formato JSON
          url = None
          for r in resources:
              if "json" in r["format"].lower():
                  url = r["url"]
                  break

          if not url:
              raise Exception("Nessun file JSON trovato nel dataset")

          print(url)
          open("url.txt", "w").write(url)
          EOF

      - name: Scarica estrazioni ufficiali
        run: |
          curl -sS "$(cat url.txt)" -o estrazioni.json

      - name: Genera latest.json e previous.json
        run: |
          python3 << 'EOF'
          import json

          data = json.load(open("estrazioni.json"))

          # Ordina per data
          data_sorted = sorted(data, key=lambda x: x["data_estrazione"], reverse=True)

          latest = data_sorted[0]
          previous = data_sorted[1]

          # Converte nel formato della tua app
          def convert(e):
              return {
                  "date": e["data_estrazione"],
                  "concorso": e["concorso"],
                  "ruote": e["ruote"]
              }

          open("latest.json", "w").write(json.dumps(convert(latest), indent=2))
          open("previous.json", "w").write(json.dumps(convert(previous), indent=2))
          EOF

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json previous.json
          git commit -m "Aggiornamento automatico estrazioni ufficiali" || echo "Nessun cambiamento"
          git push
