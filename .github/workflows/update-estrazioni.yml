name: Aggiorna estrazioni Lotto (ADM)

on:
  schedule:
    - cron: "35 20 * * 2,4,6"
  workflow_dispatch:

jobs:
  update-estrazioni:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scarica pagina ADM
        run: |
          curl -sS "https://www.adm.gov.it/portale/lotto" -o adm.html

      - name: Estrai numeri e genera latest.json
        run: |
          python3 << 'EOF'
          import re, json

          html = open("adm.html").read()

          # Estrazione data concorso
          data = re.search(r"Estrazione del (\d{2}/\d{2}/\d{4})", html)
          data = data.group(1) if data else "00/00/0000"

          # Estrazione numero concorso
          concorso = re.search(r"Concorso n\. (\d+)", html)
          concorso = concorso.group(1) if concorso else "0"

          # Estrazione ruote
          ruote = {}
          blocchi = re.findall(r'<div class="ruota">(.*?)</div>', html, re.S)

          for blocco in blocchi:
              nome = re.search(r'<h3>(.*?)</h3>', blocco)
              nome = nome.group(1).strip().upper() if nome else None

              numeri = re.findall(r'<span class="numero">(.*?)</span>', blocco)
              numeri = [int(n) for n in numeri if n.isdigit()]

              if nome and numeri:
                  ruote[nome] = numeri[:5]

          latest = {
              "date": data,
              "concorso": concorso,
              "ruote": ruote
          }

          with open("latest.json", "w") as f:
              json.dump(latest, f, indent=2)
          EOF

      - name: Sposta latest.json in previous.json
        run: |
          if [ -f previous.json ]; then
            cp latest.json previous.json
          fi

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json previous.json
          git commit -m "Aggiornamento automatico estrazioni ADM" || echo "Nessun cambiamento"
          git push
